{% extends "base.html" %}

{% block title %}{{ post.title }} · Resources{% endblock %}
{% block body_class %}page-blog-detail{% endblock %}

{% block content %}
<section class="block block--cream">
    <div class="block-inner block-inner--narrow">
        <p class="hero-badge">Resources</p>
        <h1 class="block-title">{{ post.title }}</h1>
        <p class="feature-card-meta">{{ post.created_at|date:"F j, Y" }}</p>
        <div class="blog-post-body">
            {{ post.body|linebreaks }}
        </div>
        <p style="margin-top: 2rem;">
            <a href="{% url 'blog_index' %}" class="btn btn-secondary">← Back to all articles</a>
        </p>
    </div>
</section>
{% endblock %}
